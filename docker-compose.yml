version: '3.8'

services:

  db:
    image: postgres:15-alpine
    container_name: parsing_bot_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required — copy .env.example to .env}
      POSTGRES_DB: parsing_bot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: parsing_bot_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  telegram_bot:
    build:
      context: .
      dockerfile: telegram_bot/Dockerfile
    container_name: parsing_bot
    command: python -m telegram_bot.main
    env_file: .env
    volumes:
      - .:/app
      - telegram_sessions:/app/sessions
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery_worker:
    build:
      context: .
      dockerfile: telegram_bot/Dockerfile
    container_name: parsing_bot_worker
    command: celery -A telegram_bot.tasks.celery_app worker -Q parsing -c 2 --loglevel=info
    env_file: .env
    environment:
      WORKER_SESSION_INDEX: "0"
    volumes:
      - telegram_sessions:/app/sessions
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  telegram_sessions:
